name: Release

on:
  push:
    tags:
      - '@veams/*@*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Extract package info
        id: info
        run: |
          TAG=${{ github.ref_name }}
          PACKAGE_NAME=$(echo $TAG | cut -d'@' -f1,2)
          VERSION=$(echo $TAG | cut -d'@' -f3)
          # Map @veams/name to folder name
          FOLDER_NAME=$(echo $PACKAGE_NAME | cut -d'/' -f2)
          echo "package_name=$PACKAGE_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "folder_name=$FOLDER_NAME" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci --workspace=${{ steps.info.outputs.package_name }} --include-workspace-root

      - name: Build package
        run: npm run build -- --filter=${{ steps.info.outputs.package_name }}

      - name: Package dist
        run: |
          cd packages/${{ steps.info.outputs.folder_name }}
          zip -r "../../${{ steps.info.outputs.folder_name }}-dist-${{ steps.info.outputs.version }}.zip" dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.info.outputs.folder_name }}-dist-${{ steps.info.outputs.version }}.zip
          generate_release_notes: true
          name: "${{ steps.info.outputs.package_name }} v${{ steps.info.outputs.version }}"
